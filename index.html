    <script defer>

    // ── LangToggle inline (page principale, pas de renderPage sur projet) ──────

    const STORAGE_KEY = "portfolio-lang";

    function getCurrentLang() {
        return localStorage.getItem(STORAGE_KEY) || "en";
    }

    function updateSlider(activeBtn, firstBtn) {
        const slider = document.querySelector("#lang-toggle .lt-slider");
        if (!slider) return;
        slider.style.width     = activeBtn.offsetWidth + "px";
        slider.style.transform = `translateX(${activeBtn.offsetLeft - firstBtn.offsetLeft}px)`;
    }

    function renderHome(data) {
        document.title = data.title;

        // ── Nav ───────────────────────────────────────────────────────────────
        document.getElementById("nav-about").textContent    = data.nav.about;
        document.getElementById("nav-projects").textContent = data.nav.projects;
        document.getElementById("nav-skills").textContent   = data.nav.skills;
        document.getElementById("nav-contact").textContent  = data.nav.contact;

        // dropdown mobile aussi
        document.getElementById("drop-about").textContent    = data.nav.about;
        document.getElementById("drop-projects").textContent = data.nav.projects;
        document.getElementById("drop-skills").textContent   = data.nav.skills;
        document.getElementById("drop-contact").textContent  = data.nav.contact;

        // ── Banner ────────────────────────────────────────────────────────────
        document.getElementById("banner-role").textContent        = data.banner.role;
        document.getElementById("banner-description").textContent = data.banner.description;

        // ── About ─────────────────────────────────────────────────────────────
        document.getElementById("about-title").textContent = data.about.title;
        document.getElementById("about-content").innerHTML =
            data.about.paragraphs.map(p => `<p>${p}</p>`).join("");

        // ── Projects ──────────────────────────────────────────────────────────
        document.getElementById("projects-title").textContent = data.projects.title;
        const filterEl = document.getElementById("projects-filter");
        filterEl.innerHTML = data.projects.filters.map((f, i) =>
            `<button data-filter="${f.value}"${i === 0 ? ' class="active"' : ''}>${f.label}</button>`
        ).join("");

        // ── Skills ────────────────────────────────────────────────────────────
        document.getElementById("skills-title").textContent     = data.skills.title;
        document.getElementById("skills-technical").textContent = data.skills.technical;
        document.getElementById("skills-soft").textContent      = data.skills.soft;
        document.getElementById("skills-soft-set").setAttribute("tags", data.skills.softTags);

        // ── Contact ───────────────────────────────────────────────────────────
        document.getElementById("contact-title").textContent       = data.contact.title;
        document.getElementById("contact-description").textContent = data.contact.description;
    }

    function setLang(lang) {
        localStorage.setItem(STORAGE_KEY, lang);

        const buttons  = document.querySelectorAll("#lang-toggle button");
        const firstBtn = buttons[0];

        buttons.forEach(btn => btn.classList.toggle("active", btn.dataset.lang === lang));
        const activeBtn = document.querySelector(`#lang-toggle button[data-lang="${lang}"]`);
        updateSlider(activeBtn, firstBtn);

        const data = lang === "fr" ? HOME_FR : HOME_EN;
        renderHome(data);
    }

    function injectToggle() {
        const toggle = document.createElement("div");
        toggle.id = "lang-toggle";
        toggle.setAttribute("role", "group");
        toggle.setAttribute("aria-label", "Language selector");
        toggle.innerHTML = `
            <div class="lt-slider"></div>
            <button data-lang="en">EN</button>
            <button data-lang="fr">FR</button>
        `;
        toggle.querySelectorAll("button").forEach(btn => {
            btn.addEventListener("click", () => setLang(btn.dataset.lang));
        });
        document.body.appendChild(toggle);
    }

    document.addEventListener("DOMContentLoaded", () => {
        injectToggle();

        const lang    = getCurrentLang();
        const buttons = document.querySelectorAll("#lang-toggle button");
        const active  = document.querySelector(`#lang-toggle button[data-lang="${lang}"]`);

        buttons.forEach(btn => btn.classList.toggle("active", btn.dataset.lang === lang));
        requestAnimationFrame(() => updateSlider(active, buttons[0]));

        renderHome(lang === "fr" ? HOME_FR : HOME_EN);
    });

    window.addEventListener("resize", () => {
        const active   = document.querySelector("#lang-toggle button.active");
        const firstBtn = document.querySelector("#lang-toggle button");
        if (active && firstBtn) updateSlider(active, firstBtn);
    });

    </script>
